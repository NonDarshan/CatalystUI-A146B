name: Build Catalyst UI (A146B)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 40000
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run build
        run: |
          chmod +x ./build_catalyst.sh
          sudo ./build_catalyst.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatalystUI_A146B_Release
          path: out/*.zip
